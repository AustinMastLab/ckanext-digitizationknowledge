scheming_version: 2
dataset_type: scholarly-article
about: A reimplementation of the CKAN dataset schema for scholarly-articles
about_url: https://github.com/iDigAcademy/ckanext-digitizationknowledge


dataset_fields:

# our id + name fields are uuids and always equal

- field_name: id
  label: ID
  preset: digitizationknowledge_dataset_id
  label: ID

- preset: digitizationknowledge_dataset_name

- field_name: title
  label: Title
  display_property: dc.title
  validators: unicode_safe digitizationknowledge_required
  required: True

- field_name: url
  label: URL
  form_placeholder: e.g., https://digitizationknowledge.org
  display_property: schema:url
  display_snippet: link.html
  required: True

- field_name: doi
  label: DOI
  form_placeholder: e.g., https://doi.org/10.3897/zookeys.209.3135
  display_property: dc:identifier:doi
  display_snippet: doi.html

- field_name: author
  label: First Author
  required: True
  form_placeholder: e.g., Sam Doe
  help_text: Author's name as written in the resource
  display_property: dc:creator
  
- field_name: author_email
  label: First Author's Email
  form_placeholder: e.g., sam.doe@digitizationknowledge.org
  display_property: dc:creator:email
  display_snippet: email.html
  display_email_name_field: author

- field_name: other_authors
  label: Other Authors
  preset: multiple_text
  form_placeholder: e.g., Sam Doe
  help_text: Author's name as written in the resource
  display_property: dc:creator

- field_name: publisher
  label: Publisher
  required: True
  form_placeholder: e.g., Philosophical Transactions of the Royal Society B Biological Sciences
  display_property: schema:publisher

- field_name: publisher_abbreviation
  label: Publisher Abbreviation
  form_placeholder: e.g., Phil. Trans. R. Soc. B
  display_property: schema:publisher

- field_name: volume_number
  label: Volume Number
  display_property: schema:volumeNumber

- field_name: issue_number
  label: Issue Number
  display_property: schema:issueNumber

- field_name: pagination
  label: Pagination
  form_placeholder: e.g., 1-5
  display_property: schema:pagination

- field_name: date_created
  label: Date Created
  preset: date
  display_property: schema:dateCreated

- field_name: date_modified
  label: Date Modified
  preset: date
  display_property: schema:dateModified

- field_name: date_published
  label: Date Published
  preset: date
  display_property: schema:datePublished

- field_name: version
  label: Version
  validators: ignore_missing unicode_safe package_version_validator
  form_placeholder: 'e.g., 1.0'
  display_property: schema:version

- field_name: license_id
  label: License
  form_snippet: license.html
  help_text: License definitions and additional information can be found at http://opendefinition.org/

- field_name: notes
  label: Description
  form_snippet: markdown.html

- field_name: in_language
  label: Language
  preset: multiple_select
  display_property: schema:inLanguage
  sorted_choices: true
  choices:
  - value: eng
    label: English
  - value: spa
    label: Spanish
  - value: fra
    label: French
  - value: por
    label: Portuguese
  - value: deu
    label: German

- field_name: is_accessible_for_free
  label: Accessible for Free
  display_property: schema:isAccessibleForFree
  preset: radio
  choices:
  - value: true
    label: "Yes"
  - value: false
    label: "No"
  validators: boolean_validator
  output_validators: boolean_validator

- field_name: has_paid_option
  label: Has Paid Option
  display_property: schema:hasPaidOption
  preset: radio
  choices:
  - value: true
    label: "Yes"
  - value: false
    label: "No"
  validators: boolean_validator
  output_validators: boolean_validator

- field_name: owner_org
  label: Organization
  preset: dataset_organization
  required: True

- field_name: category
  label: Category
  preset: select
  display_property: schema:category
  sorted_choices: true
  choices:
  - value: preprint
    label: Pre print
  - value: journal article
    label: Journal Article
  - value: technical report
    label: Technical Report

- field_name: tag_string
  label: Tags
  preset: tag_string_autocomplete
  form_placeholder: e.g., digitization workflow
  display_property: dc:subject

- field_name: in_digitization_academy_course
  label: In Digitization Academy Course
  help_text: Is this resource part of a course in the Digitization Academy?
  preset: radio
  choices:
  - value: true
    label: "Yes"
  - value: false
    label: "No"
  validators: boolean_validator
  output_validators: boolean_validator

- field_name: digitization_academy_course
  label: Digitization Academy Courses
  preset: multiple_select
  display_property: dk:digitization_academy_course
  sorted_choices: true
  choices:
  - value: Introduction to Biodiversity Specimen Digitization
    label: Introduction to Biodiversity Specimen Digitization
  - value: Digital Imaging for Biodiversity Collections
    label: Digital Imaging for Biodiversity Collections
  - value: Public Participation in Digitization of Biodiversity Collections
    label: Public Participation in Digitization of Biodiversity Collections

- field_name: task_clusters
  label: Task Clusters
  help_text:
  preset: multiple_select
  sorted_choices: true
  choices:
  - value: pre-digitization curation
    label: Pre-Digitization Curation
  - value: digital data capture
    label: Digital Data Capture
  - value: georeferencing
    label: Georeferencing
  - value: project design and management
    label: Project Design and Management
  - value: general
    label: General
  - value: digital imaging
    label: Digital Imaging
  - value: mobilization and sharing
    label: Mobilization and Sharing

- field_name: task
  label: Task
  preset: multiple_select
  sorted_choices: true
  choices:
  - value: whole-drawer imaging
    label: Whole-Drawer Imaging
  - value: label imaging
    label: Label Imaging
  - value: label transcription
    label: Label Transcription
  - value: quality control
    label: Quality Control
  - value: specimen imaging
    label: Specimen Imaging
  - value: image processing
    label: Image Processing
  - value: image capture
    label: Image Capture
  - value: transcription
    label: Transcription

- field_name: preparations
  label: Specimen Preparations
  preset: multiple_select
  display_property: dwc:preparations
  sorted_choices: true
  choices:
  - value: herbarium sheets
    label: Herbarium Sheets
  - value: pinned dried insects
    label: Pinned Dried Insects
  - value: microscope slides
    label: Microscope Slides
  - value: flat sheets and packets
    label: Flat Sheets and Packets
  - value: pinned things in trays and drawers
    label: Pinned Things in Trays and Drawers
  - value: things in spirits in jars
    label: Things in Spirits in Jars
  - value: three-dimensional objects in trays and boxes
    label: Three-Dimensional Objects in Trays and Boxes
  - value: general
    label: General

- field_name: audience
  label: Audience
  preset: multiple_select
  display_property: schema:audience
  sorted_choices: true
  choices:
  - value: general
    label: General
  - value: collections professionals
    label: Collections Professionals
  - value: educators
    label: Educators
  - value: researchers
    label: Researchers
  - value: participatory science practitioners
    label: Participatory Science Practitioners
  - value: participatory science coordinators
    label: Participatory Science Coordinators

- field_name: discipline
  label: Discipline
  preset: multiple_select
  display_property: ltc:discipline
  sorted_choices: true
  choices:
  - value: botany
    label: Botany
  - value: entomology
    label: Entomology
  - value: paleontology
    label: Paleontology
  - value: ornithology
    label: Ornithology
  - value: ichthyology
    label: Ichthyology
  - value: general
    label: General
  - value: zoology - arthropods
    label: Zoology - Arthropods
  - value: anthropology
    label: Anthropology
  - value: cultural heritage
    label: Cultural Heritage
  - value: geology
    label: Geology
  - value: mammalogy
    label: Mammalogy
  - value: zoology
    label: Zoology
  - value: ecology
    label: Ecology

- field_name: equipment
  label: Equipment
  preset: multiple_select
  sorted_choices: true
  choices:
  - value: 2d imaging
    label: 2D Imaging
  - value: 3d modeling
    label: 3D modeling

resource_fields:

- field_name: url
  label: URL
  preset: resource_url_upload
  display_property: schema:url

- field_name: doi
  label: DOI
  form_placeholder: https://doi.org/10.3897/zookeys.209.3135
  display_property: dc:identifier:doi
  display_snippet: doi.html

- field_name: date_created
  label: Date Created
  preset: date
  display_property: schema:dateCreated

- field_name: date_modified
  label: Date Modified
  preset: date
  display_property: schema:dateModified

- field_name: date_published
  label: Date Published
  preset: date
  display_property: schema:datePublished

- field_name: version
  label: Version
  validators: ignore_missing unicode_safe package_version_validator
  form_placeholder: '1.0'
  display_property: schema:version
  
- field_name: name
  label: Name
  form_placeholder: Title
  display_property: dc:title

- field_name: description
  label: Description
  form_snippet: markdown.html
  display_property: schema:abstract

- field_name: format
  label: Format
  preset: resource_format_autocomplete
